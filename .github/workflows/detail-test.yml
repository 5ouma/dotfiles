name: 🔬 Detail Test

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/detail-test.yml
  pull_request:
    paths:
      - .github/workflows/detail-test.yml
  schedule:
    - cron: 0 0 * * SAT
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ case(startsWith(matrix.os, 'macOS-'), '🍎', startsWith(matrix.os, 'Ubuntu-'), '🐧', '❓') }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [Ubuntu-24.04, Ubuntu-24.04-ARM, macOS-15]

    steps:
      - name: 🧰 Install dependencies
        if: ${{ startsWith(matrix.os, 'Ubuntu-') }}
        run: |
          curl -L "https://update.code.visualstudio.com/latest/linux-deb-${RUNNER_ARCH,,}/stable" -o /tmp/code.deb
          sudo apt-get update
          sudo apt-get install -y build-essential procps curl file git zsh /tmp/code.deb

      - name: 🍺 Uninstall Homebrew related
        if: ${{ startsWith(matrix.os, 'macOS-') }}
        run: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/uninstall.sh)"
        env:
          NONINTERACTIVE: 1

      - name: ⚙️ Run setup
        run: zsh <(curl "https://dot.5ouma.me/${GITHUB_HEAD_REF:-HEAD}") --yes
        env:
          SETUP_SKIP_RESTOREAPPSETTINGS: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐚 Launch new login shell
        run: exec zsh -ilexc exit
