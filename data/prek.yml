default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

repos:
  - repo: local
    hooks:
      - id: op-launcher
        name: 1Password desktop app launcher
        description: Open 1Password desktop app to ensure the CLI is authenticated
        entry: op account list
        language: system
        always_run: true
        fail_fast: true
        pass_filenames: false
        stages: [pre-commit, pre-push]

  - repo: builtin
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-json
        exclude: Library/Application\ Support/Code/User/(settings|keybindings)\.json$
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: detect-private-key
        stages: [pre-commit]
      - id: check-executables-have-shebangs
        stages: [pre-commit]

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: ad1b27d73581aa16cca06fc4a0761fc563ffe8e8 # frozen: v1.5.6
    hooks:
      - id: remove-tabs
        args: [--whitespaces-count, "2"]
        exclude: ^(.+/)*(.+\.go|go\..+|Makefile|.+\.plist)$
        stages: [pre-commit]

  - repo: https://github.com/crate-ci/typos
    rev: 37bb98842b0d8c4ffebdb75301a13db0267cef89 # frozen: v1.47.2
    hooks:
      - id: typos
        stages: [pre-commit]

  - repo: https://github.com/betterleaks/betterleaks
    rev: ac65f4739c352ab23dc2650a65be261016543599 # frozen: v1.5.0
    hooks:
      - id: betterleaks
        stages: [pre-commit]

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
    hooks:
      - id: actionlint
        language: golang
        additional_dependencies:
          - github.com/wasilibs/go-shellcheck/cmd/shellcheck@4e7020840c303923eb1ab846fc446d77be892570 # frozen: v0.11.1
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: pinact
        name: Pin versions of Actions and reusable workflows
        description: Pin versions of GitHub Actions and reusable workflows
        entry: pinact run
        args: [--verify-comment]
        language: golang
        additional_dependencies:
          - github.com/suzuki-shunsuke/pinact/v4/cmd/pinact@a14c0ee5db6c9068ebab1781549c65adc9066ffa # frozen: v4.1.0
        types: [yaml]
        files: ^(\.github/workflows/.+|(.+/)*action)\.ya?ml$
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: ghalint
        name: Validate GitHub Actions workflows
        description: Check GitHub Actions workflows for security policy compliance
        entry: ghalint run
        language: golang
        additional_dependencies:
          - github.com/suzuki-shunsuke/ghalint/cmd/ghalint@050e825989101021ece297e4d2f726f519ba89ee # frozen: v1.5.6
        types: [yaml]
        files: ^\.github/workflows/.+\.ya?ml$
        stages: [pre-commit]
      - id: ghalint-act
        name: Validate GitHub Actions
        description: Check GitHub Actions for security policy compliance
        entry: ghalint act
        language: golang
        additional_dependencies:
          - github.com/suzuki-shunsuke/ghalint/cmd/ghalint@050e825989101021ece297e4d2f726f519ba89ee # frozen: v1.5.6
        types: [yaml]
        files: ^(.+/)*action\.ya?ml$
        stages: [pre-commit]

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815 # frozen: v1.26.1
    hooks:
      - id: zizmor
        args: [--no-config]
        stages: [pre-commit]

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: ea931ccc70c472cfeb2f822acba7f0e12b7842ce # frozen: 43.243.1
    hooks:
      - id: renovate-config-validator
        language: bun
        language_version: default
        args: [--strict, --no-global]
        stages: [pre-commit]

  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: 0bc55c40f85efa6234cf801d82e8da5bc0ef0b7c # frozen: v0.2.22
    hooks:
      - id: rumdl
        args: [--fail-on, warning, --disable, "MD013,MD024,MD033,MD036"]
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: shellcheck
        name: ShellCheck
        description: Static analysis tool for shell scripts
        entry: shellcheck
        language: golang
        additional_dependencies:
          - github.com/wasilibs/go-shellcheck/cmd/shellcheck@4e7020840c303923eb1ab846fc446d77be892570 # frozen: v0.11.1
        types: [shell]
        args: [-e, "SC1071,SC1072,SC1073,SC1090,SC1091,SC2015,SC2148,SC2154"]
        stages: [pre-commit]

  - repo: https://github.com/AnruKitakaze/commit-msg-guardian
    rev: e5b4e8f3d634fef0649677353ce7d792cea421c1 # frozen: v0.1.9
    hooks:
      - id: commit-msg-guardian
        args:
          - --scope-rules=allowPathScope
          - --description-rules=capitalized
          - --description-length-limit=50
          - --body-rules=oneLine
          - --body-length-limit=72
        stages: [commit-msg]

  - repo: https://github.com/5ouma/utils
    rev: 2a983b8b09b7c8cb777133f087bfdde24e8ecf75 # frozen: v0.12.2
    hooks:
      - id: upload-git-commit-notion
        stages: [pre-push]
