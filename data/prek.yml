default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

repos:
  - repo: local
    hooks:
      - id: op-launcher
        name: 1Password desktop app launcher
        description: Open 1Password desktop app to ensure the CLI is authenticated
        entry: op account list
        language: system
        always_run: true
        fail_fast: true
        pass_filenames: false
        stages: [pre-commit, pre-push]

  - repo: builtin
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-json
        exclude: Library/Application\ Support/Code/User/(settings|keybindings)\.json$
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: detect-private-key
        stages: [pre-commit]
      - id: check-executables-have-shebangs
        stages: [pre-commit]

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: ad1b27d73581aa16cca06fc4a0761fc563ffe8e8 # frozen: v1.5.6
    hooks:
      - id: remove-tabs
        args: [--whitespaces-count, "2"]
        exclude: ^(.+/)*(.+\.go|go\..+|Makefile|.+\.plist)$
        stages: [pre-commit]

  - repo: https://github.com/crate-ci/typos
    rev: cf5f1c29a8ac336af8568821ec41919923b05a83 # frozen: v1.45.1
    hooks:
      - id: typos
        stages: [pre-commit]

  - repo: https://github.com/betterleaks/betterleaks
    rev: 31746c9420b19a592848b21d6d8977d53cc6da0e # frozen: v1.1.2
    hooks:
      - id: betterleaks
        stages: [pre-commit]

  - repo: https://github.com/rhysd/actionlint
    rev: 914e7df21a07ef503a81201c76d2b11c789d3fca # frozen: v1.7.12
    hooks:
      - id: actionlint
        language: golang
        additional_dependencies:
          - github.com/wasilibs/go-shellcheck/cmd/shellcheck@4e7020840c303923eb1ab846fc446d77be892570 # frozen: v0.11.1
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: pinact
        name: Pin versions of Actions and reusable workflows
        description: Pin versions of GitHub Actions and reusable workflows
        entry: pinact run
        args: [--verify]
        language: golang
        additional_dependencies:
          - github.com/suzuki-shunsuke/pinact/v3/cmd/pinact@9d8b3209778c876e9cdf2af2824f9573758273c3 # frozen: v3.9.0
        types: [yaml]
        files: ^(\.github/workflows/.+|(.+/)*action)\.ya?ml$
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: ghalint
        name: Validate GitHub Actions workflows
        description: Check GitHub Actions workflows for security policy compliance
        entry: ghalint run
        language: golang
        additional_dependencies:
          - github.com/suzuki-shunsuke/ghalint/cmd/ghalint@99b0e63be7fbd4c30c6d0b3da5b4a94a19ad55e6 # frozen: v1.5.5
        types: [yaml]
        files: ^\.github/workflows/.+\.ya?ml$
        stages: [pre-commit]
      - id: ghalint-act
        name: Validate GitHub Actions
        description: Check GitHub Actions for security policy compliance
        entry: ghalint act
        language: golang
        additional_dependencies:
          - github.com/suzuki-shunsuke/ghalint/cmd/ghalint@99b0e63be7fbd4c30c6d0b3da5b4a94a19ad55e6 # frozen: v1.5.5
        types: [yaml]
        files: ^(.+/)*action\.ya?ml$
        stages: [pre-commit]

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: a4727cbbcd26d7098e96b9cb738169b59711ae51 # frozen: v1.24.1
    hooks:
      - id: zizmor
        args: [--no-config]
        stages: [pre-commit]

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 85a7c0feb5cd0a5d32b320846ae7e4fbbb0e3417 # frozen: 43.140.0
    hooks:
      - id: renovate-config-validator
        language: bun
        language_version: default
        args: [--strict]
        stages: [pre-commit]

  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: 7a9cae8b0b2a12b63419789b233f52932917b7a4 # frozen: v0.1.80
    hooks:
      - id: rumdl
        args: [--fail-on, warning, --disable, "MD013,MD024,MD033,MD036"]
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: shellcheck
        name: ShellCheck
        description: Static analysis tool for shell scripts
        entry: shellcheck
        language: golang
        additional_dependencies:
          - github.com/wasilibs/go-shellcheck/cmd/shellcheck@4e7020840c303923eb1ab846fc446d77be892570 # frozen: v0.11.1
        types: [shell]
        args: [-e, "SC1071,SC1072,SC1073,SC1090,SC1091,SC2015,SC2148,SC2154"]
        stages: [pre-commit]

  - repo: https://github.com/AnruKitakaze/commit-msg-guardian
    rev: e25f573ef13526892b59eb45f1b62cec7d9e48c7 # frozen: v0.1.8
    hooks:
      - id: commit-msg-guardian
        args: [--scope-rules=allowPathScope]
        stages: [commit-msg]

  - repo: https://github.com/5ouma/utils
    rev: 89264fffe82e991f0045e4a1b80d243de3011934 # frozen: v0.9.5
    hooks:
      - id: upload-git-commit-notion
        stages: [pre-push]
